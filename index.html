<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Shot Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap');

    :root {
      --bg: #0a0a0a;
      --border: #222;
      --text: #f0f0f0;
      --muted: #444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 52px 24px 40px;
      max-width: 390px;
      margin: 0 auto;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 0.08em;
      line-height: 1;
      text-align: center;
    }

    .timer {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-top: 10px;
    }

    .track-selector {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }
    .track-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .track-name {
      font-size: 13px;
      letter-spacing: 0.06em;
      color: var(--text);
      transition: opacity 0.15s;
    }
    .track-selector:active .track-name {
      opacity: 0.3;
    }

    .ball-btn {
      margin-top: 36px;
      width: 220px;
      height: 220px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s, opacity 0.2s;
    }
    .ball-btn:active {
      transform: scale(0.95);
    }
    .ball-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .ball-btn.playing img {
      opacity: 0.6;
    }

    .stats {
      margin-top: 40px;
      display: flex;
      align-items: flex-end;
      gap: 32px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      line-height: 1;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .stat-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
      margin-bottom: 24px;
    }

    .pct {
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .log-section {
      margin-top: 48px;
      width: 100%;
    }
    .log-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    #log p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    #log p:first-child {
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="title">SHOT<br>TRACKER</div>

  <div class="timer" id="timer">00:00</div>

  <div class="track-selector" onclick="cycleTrack()">
    <span class="track-label">Select Mode</span>
    <span class="track-name" id="track-name">Rain</span>
  </div>

  <div class="ball-btn" id="ball-btn" onclick="toggleAudio()">
    <img src="basketball.gif" alt="basketball">
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="stat-made">0</span>
      <span class="stat-label">Made</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value" id="stat-miss">0</span>
      <span class="stat-label">Miss</span>
    </div>
  </div>

  <div class="pct" id="pct">(00.0%)</div>

  <div class="log-section">
    <div class="log-label">Sessions</div>
    <div id="log"></div>
  </div>

  <script>
    const tracks = [
        { name: 'Rain',                   file: 'rain.mp3' },
        { name: 'Silence',                file: 'silence.mp3' },
        { name: 'Shiloh (Rain)',           file: 'shilohrain.mp3' },
        { name: 'Clara Lan San (slowed)',  file: 'claraslowed.mp3' },
    ]
    let trackIndex = 0

    function cycleTrack() {
        playSound('click.mp3')
        if (tracking) return
        trackIndex = (trackIndex + 1) % tracks.length
        document.getElementById('track-name').textContent = tracks[trackIndex].name
        audio.pause()
        audio = new Audio(tracks[trackIndex].file)
        audio.loop = true
    }

    let audio = new Audio(tracks[0].file)
    audio.loop = true
    let audioCtx = null

    async function playSound(url) {
      if (!audioCtx) audioCtx = new AudioContext()
      const res = await fetch(url)
      const buf = await res.arrayBuffer()
      const decoded = await audioCtx.decodeAudioData(buf)
      const src = audioCtx.createBufferSource()
      src.buffer = decoded
      src.connect(audioCtx.destination)
      src.start()
    }

    let wakeLock = null
    async function requestWakeLock() {
      try { wakeLock = await navigator.wakeLock.request('screen') } catch(e) {}
    }
    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release(); wakeLock = null }
    }

    let timerInterval = null
    let seconds = 0

    function startTimer() {
      seconds = 0
      timerInterval = setInterval(() => {
        seconds++
        const m = String(Math.floor(seconds / 60)).padStart(2, '0')
        const s = String(seconds % 60).padStart(2, '0')
        document.getElementById('timer').textContent = m + ':' + s
      }, 1000)
    }

    function stopTimer() {
      clearInterval(timerInterval)
      timerInterval = null
      document.getElementById('timer').textContent = '00:00'
    }

    let tracking = false
    let madeCount = 0
    let missCount = 0

    function toggleAudio() {
      const ball = document.getElementById('ball-btn')
      if (!tracking) {
        madeCount = 0
        missCount = 0
        updateStats()
        tracking = true
        ball.classList.add('playing')
        startTimer()
        requestWakeLock()
        playSound('dribble.mp3')
        setTimeout(() => {
            audio.play()
        }, 1000)
      } else {
        audio.pause()
        tracking = false
        ball.classList.remove('playing')
        stopTimer()
        logSession()
        releaseWakeLock()
        playSound('buzzer.mp3')
      }
    }

    function updateStats() {
      const total = madeCount + missCount
      const pct = total === 0 ? '00.0' : (madeCount / total * 100).toFixed(1)
      document.getElementById('stat-made').textContent = madeCount
      document.getElementById('stat-miss').textContent = missCount
      document.getElementById('pct').textContent = '(' + pct + '%)'
    }

    function logSession() {
      if (madeCount + missCount === 0) return
      const total = madeCount + missCount
      const pct = (madeCount / total * 100).toFixed(1)
      const line = document.createElement('p')
      line.textContent = madeCount + '/' + total + ' · ' + pct + '%'
      document.getElementById('log').prepend(line)
    }

    navigator.mediaSession.setActionHandler('nexttrack', () => {
      if (!tracking) return
      playSound('swish.mp3')
      madeCount++
      updateStats()
    })

    navigator.mediaSession.setActionHandler('previoustrack', () => {
      if (!tracking) return
      playSound('brick.mp3')
      missCount++
      updateStats()
    })
  </script>

</body>
</html>
